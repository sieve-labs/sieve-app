name: sieve
description: "Sort anything, automatically"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^15.1.2
  flutter_secure_storage: ^9.2.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  dio: ^5.7.0
  file_picker: ^8.1.7
  csv: ^6.0.0
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  path: ^1.9.1
  image: ^4.8.0
  permission_handler: ^12.0.1
  intl: ^0.20.2
  url_launcher: ^6.3.1
  package_info_plus: ^8.0.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/img/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "lib/img/logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "lib/img/logo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: "lib/img/logo.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "lib/img/logo.png"
  linux:
    generate: true
    image_path: "lib/img/logo.png"

flutter:
  uses-material-design: true
